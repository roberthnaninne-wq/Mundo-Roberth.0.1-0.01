# Supabase Configuration
project_id = "MundoRoberth01"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
pool_mode = "transaction"
default_pool_size = 20

[db.migrations]
enabled = true

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 6

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = false

[edge_runtime]
enabled = true
deno_version = 2

[functions.telegram-webhook]
enabled = true
verify_jwt = false
import_map = "./functions/telegram-webhook/deno.json"
entrypoint = "./functions/telegram-webhook/index.ts"

[functions.process-intent]
enabled = true
verify_jwt = false
import_map = "./functions/process-intent/deno.json"
entrypoint = "./functions/process-intent/index.ts"
